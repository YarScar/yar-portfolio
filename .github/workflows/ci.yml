# ============================================
# CI/CD - SECURITY-FIRST BUILD & DEPLOYMENT
# This workflow runs automatically on GitHub
# when I push code or make pull requests
# ============================================

name: CI/CD Pipeline

# When should this workflow run?
on:
  push:
    branches: [ main, develop ]  # Runs when I push to main or develop
  pull_request:
    branches: [ main ]           # Runs when someone makes a Pull Request (PR) to main
                                 # Pull Request = suggesting changes before merging to main

# Jobs run in sequence (security → build-and-test → deploy)
jobs:
  # ==========================================
  # JOB 1: SECURITY CHECK (Runs FIRST!)
  # Purpose: Check for vulnerable npm packages
  # Security-first approach: blocks everything if vulnerabilities found
  # ==========================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download my code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Step 2: Install Node.js (needed to run npm commands)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Same version as Dockerfile
          
      # Step 3: Check for vulnerable packages
      # This will FAIL the build if vulnerabilities are found
      # For development, add "|| true" at the end to show warnings only
      - name: Run security audit
        run: npm audit

  # ==========================================
  # JOB 2: BUILD, TEST & VERIFY
  # Purpose: Full integration test with Docker + Database
  # Only runs if security check passes!
  # ==========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: security  # ← Waits for security job to pass (security-first!)
    
    # Set up a PostgreSQL database for testing
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      # Step 1: Download code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js for running tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Step 3: Install dependencies (including devDependencies for testing)
      - name: Install dependencies
        run: npm ci
      
      # Step 4: Set up test database URL
      - name: Setup test database
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public" > .env
      
      # Step 5: Run database migrations
      - name: Run migrations
        run: npx --yes prisma@6.19.2 migrate deploy
      
      # Step 6: Seed test database with sample data
      - name: Seed database
        run: node prisma/seed.js
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public
      
      # Step 7: Start Next.js dev server in background
      - name: Start dev server
        run: npm run dev &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public
      
      # Step 8: Wait for server to be ready
      - name: Wait for server
        run: sleep 10
      
      # Step 9: Run tests against running server and database
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public
      
      # Step 10: Build Docker containers (verify production build works)
      - name: Build Docker containers
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build
      
      # Step 11: Start Docker services
      - name: Start Docker services
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d
      
      # Step 12: Wait for database to be ready
      - name: Wait for database to be ready
        run: sleep 15
      
      # Step 13: Run database migrations in Docker
      - name: Run database migrations in Docker
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T app npm run migrate
      
      # Step 14: Verify deployment
      # Check that the app container is running and healthy
      - name: Verify deployment
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml ps
      
      # Step 15: Show container logs (helpful for debugging)
      # Only runs if previous steps failed
      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs
      
      # Step 16: Clean up (always runs, even if tests failed)
      # -v = remove volumes too (clean slate for next run)
      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  # ==========================================
  # JOB 3: DEPLOY TO PRODUCTION (Optional)
  # Purpose: Auto-deploy to EC2 server
  # Only runs: on main branch, after all tests pass
  # ==========================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test  # ← Waits for tests to pass
    if: github.ref == 'refs/heads/main'  # ← Only runs on main branch (not PRs or develop)
    
    steps:
      # Deploy via SSH to EC2 server
      # Requires secrets: EC2_HOST, EC2_USER, EC2_KEY
      # To set up: GitHub repo → Settings → Secrets → Actions
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}        # Your EC2 public IP
          username: ${{ secrets.EC2_USER }}    # Usually 'ubuntu' or 'ec2-user'
          key: ${{ secrets.EC2_KEY }}          # Your .pem private key content
          script: |
            # Navigate to app directory (or clone if first deploy)
            if [ ! -d ~/yar-portfolio ]; then
              git clone https://github.com/YOUR-USERNAME/yar-portfolio.git ~/yar-portfolio
            fi
            cd ~/yar-portfolio
            
            # Pull latest code from main branch
            git pull origin main
            
            # Rebuild and restart containers
            docker compose down
            docker compose up --build -d
            
            # Run database migrations on production
            # Uses installed Prisma version, not npx (prevents version mismatch)
            docker compose exec -T app npm run migrate
            
            # Optional: Show running containers
            docker compose ps