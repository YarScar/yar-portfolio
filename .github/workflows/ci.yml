# ============================================
# CI/CD - SECURITY-FIRST BUILD & DEPLOYMENT
# This workflow runs automatically on GitHub
# when I push code or make pull requests
# ============================================

name: CI/CD Pipeline

# When should this workflow run?
on:
  push:
    branches: [ main, develop ]  # Runs when I push to main or develop
  pull_request:
    branches: [ main ]           # Runs when someone makes a Pull Request (PR) to main
                                 # Pull Request = suggesting changes before merging to main

# Jobs run in sequence (security → build-and-test → deploy)
jobs:
  # ==========================================
  # JOB 1: SECURITY CHECK (Runs FIRST!)
  # Purpose: Check for vulnerable npm packages
  # Security-first approach: blocks everything if vulnerabilities found
  # ==========================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download my code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
        
      # Step 2: Install Node.js (needed to run npm commands)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # Same version as Dockerfile
          
      # Step 3: Check for vulnerable packages
      # This will FAIL the build if vulnerabilities are found
      # For development, add "|| true" at the end to show warnings only
      - name: Run security audit
        run: npm audit

  # ==========================================
  # JOB 2: BUILD, TEST & VERIFY
  # Purpose: Full integration test with Docker + Database
  # Only runs if security check passes!
  # ==========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: security  # ← Waits for security job to pass (security-first!)
    
    # Set up a PostgreSQL database for testing
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      # Step 1: Download code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Setup Node.js for running tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Step 3: Install dependencies (including devDependencies for testing)
      - name: Install dependencies
        run: npm ci
      
      # Step 4: Set up test database URL
      - name: Setup test database
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public" > .env
      
      # Step 5: Run database migrations
      - name: Run migrations
        run: npx --yes prisma@6.19.2 migrate deploy
      
      # Step 6: Seed test database with sample data
      - name: Seed database
        run: node prisma/seed.js
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public
      
      # Step 7: Start Next.js dev server in background
      - name: Start dev server
        run: npm run dev &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public
      
      # Step 8: Wait for server to be ready
      - name: Wait for server
        run: sleep 10
      
      # Step 9: Run tests against running server and database
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_test?schema=public
      
      # ============================================
      # CLEANUP BEFORE DOCKER
      # Problem: After tests, dev server (port 3000) and GitHub Actions postgres (port 5432) are still running
      # Solution: Kill both processes to free up ports for Docker Compose
      # Why: Docker needs these same ports for its own containers
      # ============================================
      # Step 10: Stop dev server and GitHub Actions postgres to free ports
      - name: Stop dev server and postgres
        run: |
          pkill -f "next dev" || true                                            # Kill Next.js dev server (frees port 3000)
          docker stop $(docker ps -q --filter ancestor=postgres:15-alpine) || true  # Stop GitHub Actions postgres (frees port 5432)
          # Note: "|| true" prevents errors if process doesn't exist (makes cleanup safe to run multiple times)
      
      # ============================================
      # DOCKER DEPLOYMENT VERIFICATION
      # Purpose: Verify that Docker Compose setup works correctly
      # This simulates the production environment (local DB + containerized app)
      # Different from above tests which use GitHub Actions infrastructure
      # ============================================
      # Step 11: Build Docker containers (verify production build works)
      - name: Build Docker containers
        run: docker compose build
      
      # Step 12: Start Docker services (with local postgres)
      - name: Start Docker services
        run: docker compose up -d
      
      # Step 13: Wait for database to be ready
      - name: Wait for database to be ready
        run: sleep 15
      
      # Step 14: Run database migrations in Docker
      - name: Run database migrations in Docker
        run: docker compose exec -T app npm run migrate
      
      # Step 15: Verify deployment
      - name: Verify deployment
        run: docker compose ps
      
      # Step 16: Show container logs (helpful for debugging)
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
      
      # Step 17: Clean up (always runs, even if tests failed)
      - name: Tear down containers
        if: always()
        run: docker compose down -v

  # ==========================================
  # JOB 3: DEPLOY TO PRODUCTION (Optional)
  # Purpose: Auto-deploy to EC2 server
  # Only runs: on main branch, after all tests pass
  # ==========================================
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-test  # ← Waits for tests to pass
    if: github.ref == 'refs/heads/main'  # ← Only runs on main branch (not PRs or develop)
    
    steps:
      # Deploy via SSH to EC2 server
      # Requires secrets: EC2_HOST, EC2_USER, EC2_KEY, EC2_PROJECT_PATH
      # To set up: GitHub repo → Settings → Secrets → Actions
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}        # Your EC2 public IP
          username: ${{ secrets.EC2_USER }}    # Usually 'ubuntu' or 'ec2-user'
          key: ${{ secrets.EC2_KEY }}          # Your .pem private key content
          script: |
            # Set project path (where to deploy on EC2)
            PROJECT_PATH="${{ secrets.EC2_PROJECT_PATH }}"
            
            # ============================================
            # CHECK AND INSTALL DOCKER IF MISSING
            # ============================================
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing Docker..."
              
              # Update package index
              sudo apt-get update
              
              # Install prerequisites
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              
              # Add Docker's official GPG key
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              
              # Set up Docker repository
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              
              # Install Docker Engine
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              
              # Add current user to docker group (allows running docker without sudo)
              sudo usermod -aG docker $USER
              
              # Start Docker service
              sudo systemctl start docker
              sudo systemctl enable docker
              
              echo "Docker installed successfully!"
            else
              echo "Docker is already installed."
            fi
            
            # ============================================
            # DEPLOY APPLICATION
            # ============================================
            # Navigate to app directory (or clone if first deploy)
            if [ ! -d "$PROJECT_PATH" ]; then
              git clone https://github.com/YarScar/yar-portfolio.git "$PROJECT_PATH"
            fi
            cd "$PROJECT_PATH"
            
            # Pull latest code from main branch
            git pull origin main
            
            # Rebuild and restart containers
            sudo docker compose down
            sudo docker compose up --build -d
            
            # Run database migrations on production
            # Uses installed Prisma version, not npx (prevents version mismatch)
            sudo docker compose exec -T app npm run migrate
            
            # Optional: Show running containers
            sudo docker compose ps