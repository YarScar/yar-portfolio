# ============================================
# DOCKER COMPOSE - CI/CD Override
# Purpose: Override settings for GitHub Actions CI
# In CI, we use the GitHub Actions postgres service instead of a separate container
# ============================================

services:
  # Override app service for CI
  app:
    # Remove dependency on db service
    depends_on: []
    
    # Use GitHub Actions postgres instead of Docker postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@172.17.0.1:5432/portfolio_test?schema=public
  
  # Exclude database service in CI using profile
  db:
    profiles:
      - donotstart  # This profile is never activated, so db won't start
