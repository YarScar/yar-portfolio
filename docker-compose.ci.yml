# ============================================
# DOCKER COMPOSE - CI Override
# Purpose: Override for CI - app connects to external database (GitHub Actions postgres or Neon)
# No local database container needed in CI
# ============================================

services:
  # Override app service for CI
  app:
    # Remove dependency on local db (will connect to external database instead)
    depends_on: []
    
  # Don't start database service in CI (use external database)
  db:
    profiles:
      - local-only  # Only start db with --profile local-only
