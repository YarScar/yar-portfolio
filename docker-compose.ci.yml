# ============================================
# DOCKER COMPOSE - CI/CD Override
# Purpose: Override settings for GitHub Actions CI
# Usage: docker compose -f docker-compose.yml -f docker-compose.ci.yml up
# ============================================

services:
  # Override database service for CI
  # Don't expose database port - app container connects via internal Docker network
  # GitHub Actions already has postgres on port 5432 for tests
  db:
    ports: !reset []
